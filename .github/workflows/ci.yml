# CI: lint + typecheck + tests en cada push/PR
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: sismocr
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'ci_temp_pass' }}
          POSTGRES_DB: sismocr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with ruff
        run: ruff check app/ tests/ --ignore=E501

      - name: Test with pytest
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://sismocr:${{ secrets.POSTGRES_PASSWORD || 'ci_temp_pass' }}@localhost:5432/sismocr
          REDIS_URL: redis://localhost:6379/0

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sismoscr

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./sismoscr/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
