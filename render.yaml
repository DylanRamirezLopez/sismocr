# Render Blueprint — auto-deploy API + Worker + PostgreSQL + Redis
# Conecta tu repo en https://dashboard.render.com/select-repo
databases:
  - name: sismocr-db
    databaseName: sismocr
    user: sismocr
    plan: free
    region: oregon
    ipAllowList: []

services:
  - type: web
    name: sismocr-api
    runtime: docker
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sismocr-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_API_V2
        value: "true"

  - type: worker
    name: sismocr-worker
    runtime: docker
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    dockerContext: .
    dockerfilePath: ./Dockerfile.worker
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sismocr-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
