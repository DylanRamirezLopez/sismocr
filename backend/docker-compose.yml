# SismosCR — Production stack: API + Worker + PostgreSQL/PostGIS + Redis
# Usage: docker compose --env-file .env up -d
# Create a .env file with: DATABASE_URL, REDIS_URL, POSTGRES_PASSWORD
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sismocr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
      POSTGRES_DB: sismocr
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sismocr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sismocr:CHANGE_ME@postgres:5432/sismocr}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEBUG: "false"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  worker:
    build: .
    command: python -m app.workers.ingestion_worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://sismocr:CHANGE_ME@postgres:5432/sismocr}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
